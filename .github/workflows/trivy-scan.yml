name: Trivy Scheduled Scan

on:
  schedule:
    - cron: "33 8 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  trivy-scan:
    name: Trivy Scan (${{ matrix.scan.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        scan:
          - name: IaC config
            type: config
            ref: .
          - name: Dependencies
            type: fs
            ref: .
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Run Trivy (${{ matrix.scan.name }})
        uses: aquasecurity/trivy-action@6e7b7d1fd3e4fef0c5fa8cce1229c54b2c9bd0d8 # v0.30.0
        with:
          scan-type: ${{ matrix.scan.type }}
          scan-ref: ${{ matrix.scan.ref }}
          severity: CRITICAL,HIGH
          format: table
          output: trivy-results.txt
          exit-code: "1"
          ignore-unfixed: false

      - name: Publish results to job summary
        if: always()
        run: |
          {
            echo "## Trivy ${{ matrix.scan.name }} scan"
            echo ""
            echo "Severity: \`CRITICAL\`, \`HIGH\`"
            echo "Scan type: \`${{ matrix.scan.type }}\`"
            echo "Scan ref: \`${{ matrix.scan.ref }}\`"
            echo ""
            if [ -s trivy-results.txt ]; then
              echo "<details><summary>Findings</summary>"
              echo ""
              echo '```'
              cat trivy-results.txt
              echo '```'
              echo ""
              echo "</details>"
            else
              echo "No vulnerabilities found."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Notify Slack on findings
        if: failure() && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
        uses: slackapi/slack-github-action@37ebaef184d7626c5f204ab8d3baff4262dd30f0 # v1.27.0
        with:
          payload: |
            {
              "text": ":rotating_light: Trivy detected CRITICAL/HIGH findings in ${{ github.repository }} — ${{ matrix.scan.name }} scan on `${{ github.ref_name }}`\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_TRIVY_WEBHOOK_URL }}
